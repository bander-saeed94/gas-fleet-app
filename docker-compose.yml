services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      GAS_FLEET_DB_URL: sqlite:////app/data/gas_fleet.db
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
      - ../qaoa-repo:/opt/qaoa-repo:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health').status==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE: http://localhost:8000/api
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
